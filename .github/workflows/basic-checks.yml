# Basic PR checks for the organization profile repository.
# Runs markdown-lint on the profile README and any other markdown files.
name: Basic checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.42.0

      - name: Run markdownlint
        run: markdownlint "**/*.md" --ignore node_modules --disable MD013 MD033 MD041 || true
